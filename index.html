<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="referrer" content="no-referrer">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Walkman">
    <link rel="apple-touch-icon" href="https://upload.wikimedia.org/wikipedia/commons/thumb/e/e0/Walkman_logo.svg/512px-Walkman_logo.svg.png">
    
    <title>Walkman Cloud V12</title>
    <style>
        :root { --accent: #1db954; --bg: #000000; --card: #121212; --text: #ffffff; --text-dim: #b3b3b3; --danger: #e74c3c; --hires: #9b59b6; --edit: #3498db; }
        *, *::before, *::after { box-sizing: border-box; }
        body { overflow-x: hidden; width: 100%; font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: var(--bg); color: var(--text); padding: 0; margin: 0; padding-bottom: env(safe-area-inset-bottom); }
        
        .container { max-width: 800px; margin: 0 auto; width: 100%; padding: 15px; display: flex; flex-direction: column; gap: 15px; }
        
        /* HEADER */
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
        h1 { color: var(--accent); font-size: 20px; margin: 0; font-weight: 700; }
        .nav-icons { display: flex; gap: 5px; }
        .icon-btn { background: none; border: none; font-size: 22px; cursor: pointer; padding: 8px; color: #fff; }
        .icon-btn:active { transform: scale(0.9); opacity: 0.7; }

        /* LICZNIKI */
        .counters { display: flex; gap: 10px; }
        .counter-box { background: #1a1a1a; padding: 12px; border-radius: 12px; flex: 1; text-align: center; border: 1px solid #333; }
        .counter-value { font-size: 22px; font-weight: 900; color: var(--accent); display: block; }
        .szukam .counter-value { color: #f1c40f; }

        /* PANELE */
        .panel { background: var(--card); padding: 15px; border-radius: 12px; border: 1px solid #333; }
        .panel-title { font-size: 11px; text-transform: uppercase; color: var(--text-dim); margin-top: 0; margin-bottom: 12px; font-weight: 600; letter-spacing: 1px;}
        
        .input-group { display: flex; gap: 8px; width: 100%; flex-wrap: wrap; }
        input, button, select, textarea { padding: 14px; border-radius: 8px; border: none; background: #282828; color: white; font-size: 16px; width: 100%; outline: none; }
        button { background: var(--accent); color: #000; font-weight: bold; cursor: pointer; }

        /* GRID WYSZUKIWANIA (Większy wybór) */
        #apiResults { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-top: 15px; }
        .search-card { background: #1a1a1a; padding: 10px; border-radius: 12px; border: 1px solid #333; display: flex; flex-direction: column; gap: 8px; }
        .search-card img { width: 100%; aspect-ratio: 1/1; object-fit: cover; border-radius: 8px; }
        .search-card p { font-size: 11px; font-weight: bold; margin: 0; height: 32px; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
        .search-card select { padding: 8px; font-size: 12px; background: #222; border: 1px solid #333; }

        /* TWOJA KOLEKCJA - GRID OKŁADEK */
        .grid-container { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-top: 10px; }
        .grid-item { position: relative; border-radius: 10px; overflow: hidden; aspect-ratio: 1/1; background: #1a1a1a; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .grid-item img { width: 100%; height: 100%; object-fit: cover; }
        .grid-overlay { position: absolute; bottom: 0; width: 100%; background: rgba(0,0,0,0.85); padding: 6px 8px; backdrop-filter: blur(4px); }
        .grid-title { font-size: 10px; font-weight: bold; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        .format-badge { position: absolute; top: 5px; right: 5px; background: var(--accent); color: #000; font-size: 8px; font-weight: 800; padding: 2px 6px; border-radius: 10px; z-index: 2; }
        .format-badge.szukam { background: #f1c40f; }
        .format-badge.hires { background: var(--hires); color: white; }

        /* MODALE */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 9999; justify-content: center; align-items: center; padding: 20px; backdrop-filter: blur(10px); }
        .modal-content { background: var(--card); padding: 20px; border-radius: 16px; width: 100%; max-width: 450px; max-height: 90vh; overflow-y: auto; position: relative; }
        .close-x { position: absolute; top: 15px; right: 15px; font-size: 24px; color: #fff; cursor: pointer; }
        
        .detail-cover { width: 100%; aspect-ratio: 1/1; object-fit: cover; border-radius: 12px; margin-bottom: 15px; box-shadow: 0 8px 25px rgba(0,0,0,0.7); }
        .detail-notes { font-style: italic; color: var(--text-dim); font-size: 13px; text-align: center; margin-bottom: 15px; padding: 10px; background: #1a1a1a; border-radius: 8px; }
        
        .loader { text-align: center; color: var(--accent); font-weight: bold; display: none; padding: 20px; }
        
        @media (min-width: 600px) { .grid-container, #apiResults { grid-template-columns: repeat(4, 1fr); } }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>Walkman Cloud</h1>
        <div class="nav-icons">
            <button class="icon-btn" onclick="loadFromSheets()" title="Odśwież">🔄</button>
            <button class="icon-btn" onclick="exportToCSV()" title="Eksportuj">💾</button>
            <button class="icon-btn" onclick="openSettings()" title="Ustawienia">⚙️</button>
        </div>
    </div>

    <div class="counters">
        <div class="counter-box"><small>KOLEKCJA</small><span class="counter-value" id="countMam">0</span></div>
        <div class="counter-box szukam"><small>SZUKAM</small><span class="counter-value" id="countSzukam">0</span></div>
    </div>

    <div class="panel">
        <h3 class="panel-title">🌐 Szukaj w Discogs</h3>
        <div class="input-group">
            <input type="text" id="query" placeholder="Artysta lub album..." onkeypress="if(event.key === 'Enter') searchDiscogs()">
            <button onclick="searchDiscogs()" style="width:80px">Szukaj</button>
        </div>
        <div id="apiResults"></div>
    </div>
    
    <div id="loader" class="loader">Synchronizacja...</div>

    <div class="panel">
        <h3 class="panel-title" style="color: var(--accent);">📁 Moja Kolekcja</h3>
        <div class="input-group" style="margin-bottom:15px">
            <input type="text" id="localSearch" placeholder="Filtruj listę..." onkeyup="renderGrid()">
        </div>
        <div class="input-group">
            <select id="statusFilter" onchange="renderGrid()" style="flex:1">
                <option value="ALL">Wszystkie Statusy</option>
                <option value="MAM">MAM</option>
                <option value="SZUKAM">SZUKAM</option>
            </select>
            <select id="formatFilter" onchange="renderGrid()" style="flex:1">
                <option value="ALL">Wszystkie Formaty</option>
                <option value="FLAC">FLAC</option>
                <option value="FLAC Hi-Res">Hi-Res</option>
                <option value="MP3">MP3</option>
            </select>
        </div>
        <div class="grid-container" id="collectionGrid"></div>
    </div>
</div>

<div id="settingsModal" class="modal">
    <div class="modal-content">
        <span class="close-x" onclick="closeSettings()">×</span>
        <h2>Ustawienia</h2>
        <label style="font-size:12px; color:var(--text-dim)">Google Script URL</label>
        <input type="text" id="setGoogleURL" style="margin-bottom:15px">
        <label style="font-size:12px; color:var(--text-dim)">Discogs Token</label>
        <input type="password" id="setDiscogsToken">
        <button onclick="saveSettings()" style="margin-top:20px">Zapisz i przeładuj</button>
    </div>
</div>

<div id="detailsModal" class="modal">
    <div class="modal-content">
        <span class="close-x" onclick="closeDetailsModal()">×</span>
        <img id="detCover" src="" class="detail-cover">
        <h2 id="detAlbum" style="text-align:center; margin:0;"></h2>
        <p id="detArtist" style="text-align:center; color:var(--text-dim); margin-bottom:15px;"></p>
        <div id="detNotes" class="detail-notes"></div>
        <div id="detTracks" style="background:#000; padding:12px; border-radius:10px; font-size:13px; max-height:180px; overflow-y:auto; margin-bottom:20px; color:#ccc;"></div>
        <div style="display:flex; gap:10px;">
            <button onclick="openEditFromDetails()" style="background:var(--edit); color:white; flex:1">Edytuj</button>
            <button onclick="deleteFromDetails()" style="background:var(--danger); color:white; flex:1">Usuń</button>
        </div>
    </div>
</div>

<div id="editModal" class="modal">
    <div class="modal-content">
        <h2 style="color: var(--edit);">Edytuj album</h2>
        <input type="hidden" id="editIndex">
        <label style="font-size:11px; color:var(--text-dim)">WYKONAWCA</label>
        <input type="text" id="editArtist">
        <label style="font-size:11px; color:var(--text-dim); margin-top:10px">ALBUM</label>
        <input type="text" id="editAlbum">
        <div style="display:flex; gap:10px; margin-top:10px;">
            <select id="editStatus"><option value="MAM">MAM</option><option value="SZUKAM">SZUKAM</option></select>
            <select id="editFormat"><option value="FLAC">FLAC</option><option value="FLAC Hi-Res">Hi-Res</option><option value="MP3">MP3</option><option value="-">-</option></select>
        </div>
        <textarea id="editNotes" placeholder="Twoje notatki..." style="margin-top:10px; height:60px;"></textarea>
        <textarea id="editTracks" placeholder="Tracklista..." style="margin-top:10px; height:80px; font-size:12px;"></textarea>
        <div style="display:flex; gap:10px; margin-top:15px;">
            <button onclick="closeEditModal()" style="background:#444; flex:1">Anuluj</button>
            <button onclick="saveEdit()" style="flex:1">Zapisz</button>
        </div>
    </div>
</div>

<script>
    let myCollection = [];
    let currentDetailsIndex = -1;
    let GOOGLE_URL = localStorage.getItem('google_url') || '';
    let DISCOGS_TOKEN = localStorage.getItem('discogs_token') || '';

    function openSettings() { 
        document.getElementById('setGoogleURL').value = GOOGLE_URL;
        document.getElementById('setDiscogsToken').value = DISCOGS_TOKEN;
        document.getElementById('settingsModal').style.display = 'flex'; 
    }
    function closeSettings() { document.getElementById('settingsModal').style.display = 'none'; }
    function saveSettings() {
        localStorage.setItem('google_url', document.getElementById('setGoogleURL').value);
        localStorage.setItem('discogs_token', document.getElementById('setDiscogsToken').value);
        location.reload();
    }

    async function loadFromSheets() {
        if(!GOOGLE_URL) return;
        document.getElementById('loader').style.display = 'block';
        try {
            const res = await fetch(GOOGLE_URL, { redirect: 'follow' });
            myCollection = await res.json();
            renderGrid();
            updateCounters();
        } catch (e) { alert("Błąd synchronizacji z Google Sheets"); }
        document.getElementById('loader').style.display = 'none';
    }

    function updateCounters() {
        document.getElementById('countMam').innerText = myCollection.filter(i => i.Status === 'MAM').length;
        document.getElementById('countSzukam').innerText = myCollection.filter(i => i.Status === 'SZUKAM').length;
    }

    function renderGrid() {
        const container = document.getElementById('collectionGrid');
        const q = document.getElementById('localSearch').value.toLowerCase();
        const statF = document.getElementById('statusFilter').value;
        const formF = document.getElementById('formatFilter').value;
        
        const filtered = myCollection.filter(i => {
            if(!i.Wykonawca) return false;
            const matchesText = i.Wykonawca.toLowerCase().includes(q) || i.Album.toLowerCase().includes(q);
            const matchesStat = statF === "ALL" || i.Status === statF;
            const matchesForm = formF === "ALL" || i.Format === formF || (formF === "FLAC" && i.Status === "MAM" && !i.Format);
            return matchesText && matchesStat && matchesForm;
        }).sort((a,b) => a.Wykonawca.localeCompare(b.Wykonawca));

        container.innerHTML = filtered.map((item) => {
            const index = myCollection.indexOf(item);
            let bClass = item.Format === 'FLAC Hi-Res' ? 'hires' : (item.Status === 'SZUKAM' ? 'szukam' : '');
            return `
                <div class="grid-item" onclick="openDetails(${index})">
                    <img src="${item.Okładka}" loading="lazy">
                    <div class="format-badge ${bClass}">${item.Status === 'SZUKAM' ? 'SZUKAM' : item.Format}</div>
                    <div class="grid-overlay"><div class="grid-title">${item.Wykonawca}</div></div>
                </div>
            `;
        }).join('');
    }

    async function searchDiscogs() {
        const q = document.getElementById('query').value;
        if(!q) return;
        document.getElementById('loader').style.display = 'block';
        try {
            const res = await fetch(`https://api.discogs.com/database/search?q=${q}&token=${DISCOGS_TOKEN}&per_page=12`);
            const data = await res.json();
            document.getElementById('apiResults').innerHTML = data.results.map(r => `
                <div class="search-card">
                    <img src="${r.cover_image || 'https://via.placeholder.com/150'}">
                    <p>${r.title}</p>
                    <select id="sStat-${r.id}"><option value="MAM">MAM</option><option value="SZUKAM">SZUKAM</option></select>
                    <select id="sForm-${r.id}"><option value="FLAC">FLAC</option><option value="FLAC Hi-Res">Hi-Res</option><option value="MP3">MP3</option></select>
                    <button onclick="addAlbum('${r.title.replace(/'/g,"\\'")}', '${r.cover_image}', '${r.id}')" style="padding:10px; font-size:12px;">DODAJ</button>
                </div>
            `).join('');
        } catch(e) { alert("Błąd Discogs API"); }
        document.getElementById('loader').style.display = 'none';
    }

    async function addAlbum(title, cover, id) {
        const status = document.getElementById(`sStat-${id}`).value;
        const format = status === "MAM" ? document.getElementById(`sForm-${id}`).value : "-";
        document.getElementById('loader').style.display = 'block';
        try {
            const res = await fetch(`https://api.discogs.com/releases/${id}?token=${DISCOGS_TOKEN}`);
            const d = await res.json();
            const tracks = d.tracklist ? d.tracklist.map(t => t.title).join(', ') : "";
            const parts = title.split(' - ');
            const entry = { action: "ADD", Wykonawca: parts[0], Album: parts[1], Status: status, Format: format, Okładka: cover, Utwory: tracks, DiscogsID: id, Notatki: "" };
            await fetch(GOOGLE_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(entry) });
            document.getElementById('apiResults').innerHTML = '';
            document.getElementById('query').value = '';
            setTimeout(loadFromSheets, 1500);
        } catch(e) { alert("Błąd dodawania"); document.getElementById('loader').style.display = 'none'; }
    }

    function openDetails(idx) {
        currentDetailsIndex = idx;
        const i = myCollection[idx];
        document.getElementById('detCover').src = i.Okładka;
        document.getElementById('detAlbum').innerText = i.Album;
        document.getElementById('detArtist').innerText = i.Wykonawca;
        document.getElementById('detNotes').innerText = i.Notatki || "Brak dodatkowych notatek.";
        document.getElementById('detTracks').innerHTML = (i.Utwory || '').split(',').map((t, n) => `<div style="padding:4px 0; border-bottom:1px solid #222;">${n+1}. ${t.trim()}</div>`).join('');
        document.getElementById('detailsModal').style.display = 'flex';
    }
    function closeDetailsModal() { document.getElementById('detailsModal').style.display = 'none'; }

    function openEditFromDetails() {
        const i = myCollection[currentDetailsIndex];
        document.getElementById('editIndex').value = currentDetailsIndex;
        document.getElementById('editArtist').value = i.Wykonawca;
        document.getElementById('editAlbum').value = i.Album;
        document.getElementById('editStatus').value = i.Status || 'MAM';
        document.getElementById('editFormat').value = i.Format || 'FLAC';
        document.getElementById('editNotes').value = i.Notatki;
        document.getElementById('editTracks').value = i.Utwory;
        closeDetailsModal();
        document.getElementById('editModal').style.display = 'flex';
    }
    function closeEditModal() { document.getElementById('editModal').style.display = 'none'; }

    async function saveEdit() {
        const idx = document.getElementById('editIndex').value;
        const old = myCollection[idx];
        const payload = {
            action: "EDIT", oldWykonawca: old.Wykonawca, oldAlbum: old.Album,
            Wykonawca: document.getElementById('editArtist').value, Album: document.getElementById('editAlbum').value,
            Status: document.getElementById('editStatus').value, Format: document.getElementById('editFormat').value,
            Notatki: document.getElementById('editNotes').value, Utwory: document.getElementById('editTracks').value
        };
        closeEditModal();
        document.getElementById('loader').style.display = 'block';
        await fetch(GOOGLE_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
        setTimeout(loadFromSheets, 1500);
    }

    async function deleteFromDetails() {
        const i = myCollection[currentDetailsIndex];
        if(!confirm("Czy na pewno usunąć ten album?")) return;
        closeDetailsModal();
        document.getElementById('loader').style.display = 'block';
        await fetch(GOOGLE_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({action:"DELETE", Wykonawca:i.Wykonawca, Album:i.Album}) });
        setTimeout(loadFromSheets, 1500);
    }

    function exportToCSV() {
        let csv = "\uFEFFWykonawca;Album;Status;Format;Notatki\n";
        myCollection.forEach(i => csv += `${i.Wykonawca};${i.Album};${i.Status};${i.Format};${i.Notatki}\n`);
        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = "moja_kolekcja_walkman.csv";
        link.click();
    }

    loadFromSheets();
</script>
</body>
</html>
